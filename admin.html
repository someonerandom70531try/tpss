<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Skill Swap</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: #f3f2ef; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden;"> 
    
    <nav class="navbar" style="flex-shrink: 0;">
        <div class="nav-container">
            <div class="logo">
                <i data-lucide="shield-check" class="primary-icon" style="color: #ef4444;"></i>
                <a href="index.html" style="text-decoration: none; color: inherit;"><span>SkillSwap Admin</span></a>
            </div>
            <div class="nav-actions">
                <button onclick="window.location.href='index.html'" class="btn-outline" style="padding: 6px 12px; font-size: 0.85rem;">Back to App</button>
            </div>
        </div>
    </nav>

    <main style="flex: 1; max-width: 1400px; margin: 20px auto; width: 100%; display: flex; border: 1px solid #e5e7eb; border-radius: 12px; background: #ffffff; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        
        <div style="width: 280px; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; background: #f9fafb; flex-shrink: 0;">
            <div style="padding: 20px; border-bottom: 1px solid #e5e7eb;">
                <h3 style="margin: 0; font-size: 1.1rem; color: #111827;">Moderation Tools</h3>
                <p id="admin-role-badge" style="margin: 5px 0 0 0; font-size: 0.75rem; color: #8b5cf6; font-weight: 600; text-transform: uppercase;"></p>
            </div>
            <div style="display: flex; flex-direction: column; padding: 10px;">
                <button onclick="switchAdminTab('reports')" id="tab-reports" class="admin-tab active" style="display: flex; align-items: center; gap: 10px; padding: 12px 15px; border: none; background: #e0e7ff; color: #4f46e5; border-radius: 8px; text-align: left; cursor: pointer; font-weight: 500; font-size: 0.95rem; margin-bottom: 5px;">
                    <i data-lucide="flag" style="width: 18px; height: 18px;"></i> Reported Posts
                </button>
                <button onclick="switchAdminTab('users')" id="tab-users" class="admin-tab" style="display: flex; align-items: center; gap: 10px; padding: 12px 15px; border: none; background: transparent; color: #4b5563; border-radius: 8px; text-align: left; cursor: pointer; font-weight: 500; font-size: 0.95rem;">
                    <i data-lucide="users" style="width: 18px; height: 18px;"></i> Manage Users
                </button>
            </div>
        </div>

        <div style="flex: 1; display: flex; flex-direction: column; background: #ffffff; position: relative; overflow-y: auto; padding: 30px;">
            
            <div id="section-reports" style="display: block;">
                <h2 style="margin: 0 0 20px 0; color: #111827;">Reported Skills Feed</h2>
                <div id="admin-reports-container" style="display: flex; flex-direction: column; gap: 15px;">
                    <p style="color: #6b7280; text-align: center; padding: 40px;">Loading reports...</p>
                </div>
            </div>

            <div id="section-users" style="display: none;">
                <h2 style="margin: 0 0 20px 0; color: #111827;">User Directory & Network</h2>
                <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                    <input type="text" id="admin-user-search" placeholder="Search users by name..." class="modal-input" style="margin: 0; max-width: 400px;" oninput="loadAdminUsers()">
                </div>
                <div style="border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead style="background: #f9fafb; border-bottom: 1px solid #e5e7eb;">
                            <tr>
                                <th style="padding: 12px 15px; font-size: 0.85rem; color: #6b7280; font-weight: 600;">User</th>
                                <th style="padding: 12px 15px; font-size: 0.85rem; color: #6b7280; font-weight: 600;">Role</th>
                                <th style="padding: 12px 15px; font-size: 0.85rem; color: #6b7280; font-weight: 600;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-users-table">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <div id="admin-network-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 500px; width: 95%;">
            <div class="flex-row-between" style="border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; margin-bottom: 15px;">
                <h3 id="network-modal-title" style="margin: 0; color: #111827;">User Network</h3>
                <button onclick="document.getElementById('admin-network-modal').style.display='none'" class="icon-btn" style="color: #6b7280;"><i data-lucide="x" style="width: 24px; height: 24px;"></i></button>
            </div>
            <div id="admin-network-list" style="max-height: 60vh; overflow-y: auto;"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
        document.addEventListener('DOMContentLoaded', initAdminDashboard);
    </script>
</body>
</html>
