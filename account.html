<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Skill Swap</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>
<body style="background-color: #f3f2ef;"> 
    
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i data-lucide="sparkles" class="primary-icon"></i>
                <a href="index.html" style="text-decoration: none; color: inherit;"><span>SkillSwap</span></a>
            </div>
            <div class="nav-actions">
                <div id="auth-container" style="position: relative;">
                    <div id="logged-out-ui">
                        <a href="auth.html" class="btn-primary">Sign In</a>
                    </div>
                    <div id="logged-in-ui" style="display: none; align-items: center;">
                        <button id="user-avatar-btn" class="avatar-btn" title="Basic Info" onclick="toggleDropdown(event)">
                            <span id="avatar-initial"></span>
                        </button>
                        <div id="user-dropdown" class="dropdown-menu">
                            <div class="dropdown-header">
                                <p id="dropdown-username" style="font-weight: 600; margin: 0; color: #1f2937;">Username</p>
                                <p style="font-size: 0.8rem; color: #6b7280; margin: 0;">Skill Swap User</p>
                            </div>
                            <hr style="margin: 4px 0; border: none; border-top: 1px solid #eee;">
                            <a href="account.html" class="dropdown-item">
                                <i data-lucide="user" style="width: 16px; height: 16px;"></i> My Account
                            </a>
                            <button onclick="handleLogout()" class="dropdown-item logout-btn" style="width: 100%; text-align: left;">
                                <i data-lucide="log-out" style="width: 16px; height: 16px;"></i> Logout
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="profile-container">
        
        <div class="profile-card" style="padding: 0;">
            <div class="profile-banner edit-hover-group" onclick="openImageEditor('banner_url')">
                <img id="profile-banner-img" src="" alt="Banner Background" style="display: none;">
                <div class="edit-overlay">
                    <i data-lucide="camera" style="width: 30px; height: 30px;"></i>
                </div>
            </div>

            <div class="profile-info-section">
                <div class="profile-avatar-wrapper edit-hover-group" onclick="openImageEditor('avatar_url')">
                    <div class="profile-avatar-large" id="profile-page-initial"></div>
                    <img id="profile-avatar-img" style="display: none; width: 100%; height: 100%; border-radius: 50%; object-fit: cover;" src="" alt="Avatar">
                    <div class="edit-overlay circle">
                        <i data-lucide="camera" style="width: 24px; height: 24px;"></i>
                    </div>
                </div>

                <div class="profile-text">
                    <div class="flex-row-between">
                        <h1 id="profile-page-name"></h1>
                        <button class="icon-btn" onclick="editProfileField('username', 'Enter your new username:')">
                            <i data-lucide="pencil" style="width: 20px; height: 20px;"></i>
                        </button>
                    </div>
                    <p class="profile-headline" id="profile-headline" style="min-height: 24px; margin: 5px 0; color: #1f2937;"></p>
                    <div class="flex-row-between" style="justify-content: flex-start; gap: 10px;">
                        <p class="profile-location" id="profile-location" style="min-height: 20px; margin: 0; color: #6b7280; font-size: 0.9rem;"></p>
                        <button class="icon-btn" style="padding: 4px;" onclick="editProfileField('location', 'Enter your city and state:')">
                            <i data-lucide="pencil" style="width: 14px; height: 14px;"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="profile-card">
            <div class="flex-row-between" style="margin-bottom: 10px;">
                <h2 style="margin: 0;">About</h2>
                <button class="icon-btn" onclick="editProfileField('bio', 'Write a bit about yourself:')">
                    <i data-lucide="pencil" style="width: 20px; height: 20px;"></i>
                </button>
            </div>
            <p id="profile-bio" style="color: #4b5563; line-height: 1.6; white-space: pre-wrap; min-height: 24px; margin: 0;"></p>
        </div>

        <div class="profile-card">
            <div class="flex-row-between" style="margin-bottom: 15px;">
                <h2 style="margin: 0;">Skills</h2>
                <button class="icon-btn" onclick="editProfileField('profile_skills', 'Enter skills separated by commas (e.g., Linux, React):')">
                    <i data-lucide="pencil" style="width: 20px; height: 20px;"></i>
                </button>
            </div>
            <div id="profile-skills-container" class="skills-list" style="display: flex; flex-wrap: wrap; gap: 10px; min-height: 34px;">
            </div>
        </div>
    </main>

    <div id="custom-edit-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title">Edit Field</h3>
            <textarea id="modal-input" class="modal-input" rows="3" placeholder="Type here..."></textarea>
            <div class="modal-actions">
                <button onclick="closeModal()" class="btn-secondary" style="padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer;">Cancel</button>
                <button id="modal-save-btn" class="btn-primary" style="padding: 8px 16px;">Save</button>
            </div>
        </div>
    </div>

    <div id="image-editor-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 500px;">
            <h3 id="image-modal-title">Update Image</h3>
            
            <div id="image-source-options" style="text-align: center; margin: 20px 0;">
                <button onclick="document.getElementById('file-upload').click()" class="btn-primary" style="width: 100%; margin-bottom: 10px;">
                    <i data-lucide="upload" style="display: inline; width: 16px; height: 16px; margin-right: 5px;"></i> Upload from Device
                </button>
                <input type="file" id="file-upload" accept="image/*" style="display:none;" onchange="loadFileIntoCropper(event)">
                
                <p style="color: #6b7280; font-size: 0.9rem; margin: 15px 0;">— OR —</p>
                
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="link-upload-input" class="modal-input" style="margin: 0;" placeholder="Paste image link here...">
                    <button onclick="loadLinkIntoCropper()" class="btn-secondary" style="padding: 0 15px; border-radius: 6px; border: 1px solid #ddd; background: #f9fafb; cursor: pointer;">Load</button>
                </div>
            </div>

            <div id="cropper-container" style="display:none; margin-top: 15px;">
                <p style="font-size: 0.85rem; color: #6b7280; margin-bottom: 10px;">Drag to reposition or scroll to zoom.</p>
                <div style="max-height: 300px; width: 100%; overflow: hidden; background: #f3f4f6; border-radius: 8px;">
                    <img id="image-to-crop" src="" style="max-width: 100%; display: block;">
                </div>
            </div>

            <div class="modal-actions" style="margin-top: 20px;">
                <button onclick="closeImageEditor()" class="btn-secondary" style="padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer;">Cancel</button>
                <button id="save-cropped-btn" onclick="saveCroppedImage()" class="btn-primary" style="display:none; padding: 8px 16px;">Save Image</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Ensure icons load
        lucide.createIcons();
    </script>
</body>
</html>
