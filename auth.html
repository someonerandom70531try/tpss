<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Skill Swap</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: #f3f2ef; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div class="auth-card" style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;">
        
        <div style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 20px;">
            <i data-lucide="sparkles" style="color: #8b5cf6;"></i>
            <h2 style="margin: 0;">SkillSwap</h2>
        </div>

        <h1 id="auth-title" style="margin-bottom: 5px;">Welcome Back</h1>
        <p id="auth-subtitle" style="color: #6b7280; margin-bottom: 20px; font-size: 0.9rem;">Enter your details to sign in</p>

        <div id="auth-message" style="display: none; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.9rem;"></div>

        <form id="auth-form" onsubmit="handleAuthSubmit(event)">
            <div style="text-align: left; margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: 500;">Email</label>
                <input type="email" id="auth-email" class="modal-input" required style="margin-top: 0;">
            </div>
            
            <div id="username-container" style="display: none; text-align: left; margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: 500;">Username</label>
                <input type="text" id="auth-username" class="modal-input" style="margin-top: 0;">
            </div>
            
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: 500;">Password</label>
                <input type="password" id="auth-password" class="modal-input" required style="margin-top: 0;">
                <p id="password-hint" style="display: none; font-size: 0.75rem; color: #6b7280; margin-top: 5px;">Must be 8+ chars, 1 uppercase, 1 number.</p>
            </div>
            
            <button type="submit" id="auth-submit-btn" class="btn-primary" style="width: 100%;">Sign In</button>
        </form>

        <p style="margin-top: 20px; font-size: 0.9rem; color: #4b5563;">
            <span id="toggle-text">Don't have an account?</span> 
            <a href="#" id="toggle-link" onclick="toggleAuthMode(event)" style="color: #8b5cf6; text-decoration: none; font-weight: 600;">Sign up</a>
        </p>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
