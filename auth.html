<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Skill Swap</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: #f3f2ef; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;">
    
    <div class="auth-card" style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 400px;">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <a href="index.html" style="display: inline-block; margin-bottom: 15px;"><i data-lucide="sparkles" style="width: 32px; height: 32px; color: #8b5cf6;"></i></a>
            <h2 id="auth-title" style="margin: 0 0 8px 0; color: #111827; font-size: 1.5rem;">Welcome Back</h2>
            <p id="auth-subtitle" style="margin: 0; color: #6b7280; font-size: 0.95rem;">Enter your details to sign in</p>
        </div>

        <!-- Google Auth Button -->
        <button type="button" onclick="signInWithGoogle()" class="btn-outline" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; border: 1px solid #d1d5db; color: #374151; margin-bottom: 20px; font-weight: 500; background: white; transition: background 0.2s;" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='white'">
            <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google
        </button>

        <div style="display: flex; align-items: center; margin-bottom: 20px;">
            <div style="flex: 1; height: 1px; background: #e5e7eb;"></div>
            <span style="padding: 0 10px; color: #9ca3af; font-size: 0.85rem; font-weight: 500;">or</span>
            <div style="flex: 1; height: 1px; background: #e5e7eb;"></div>
        </div>

        <div id="auth-message" class="auth-message"></div>

        <form id="auth-form" onsubmit="handleAuthSubmit(event)">
            <div id="username-container" style="display: none; margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 6px; font-size: 0.9rem; font-weight: 500; color: #374151;">Username</label>
                <input type="text" id="auth-username" class="modal-input" placeholder="Choose a username" style="margin: 0; background: #f9fafb;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 6px; font-size: 0.9rem; font-weight: 500; color: #374151;">Email</label>
                <input type="email" id="auth-email" class="modal-input" placeholder="your@email.com" required style="margin: 0; background: #f9fafb;">
            </div>
            
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 6px; font-size: 0.9rem; font-weight: 500; color: #374151;">Password</label>
                <div style="position: relative;">
                    <input type="password" id="auth-password" class="modal-input" placeholder="Enter your password" required style="margin: 0; background: #f9fafb; padding-right: 40px;">
                    <i data-lucide="eye" style="position: absolute; right: 12px; top: 12px; width: 18px; height: 18px; color: #9ca3af; cursor: pointer;"></i>
                </div>
                <p id="password-hint" style="display: none; margin: 6px 0 0 0; font-size: 0.75rem; color: #6b7280;">Requires 8+ chars, 1 uppercase, 1 lowercase, 1 number.</p>
            </div>
            
            <button type="submit" id="auth-submit-btn" class="btn-primary" style="width: 100%; padding: 12px; font-size: 1rem;">Sign In</button>
        </form>

        <div style="text-align: center; margin-top: 25px; font-size: 0.9rem; color: #4b5563;">
            <span id="toggle-text">Don't have an account?</span>
            <a href="#" id="toggle-link" onclick="toggleAuthMode(event)" style="color: #8b5cf6; font-weight: 600; text-decoration: none;">Sign up</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
        // Check if the user was just redirected back from Google
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof checkOAuthSession === 'function') checkOAuthSession();
        });
    </script>
</body>
</html>
