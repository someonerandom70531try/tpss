<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Skill Swap</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">
    
    <a href="index.html" class="back-link">
        <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i> Back
    </a>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo" style="justify-content: center; margin-bottom: 16px;">
                    <i data-lucide="sparkles" class="primary-icon"></i>
                    <span>SkillSwap</span>
                </div>
                <h2 id="auth-title">Welcome Back</h2>
                <p id="auth-subtitle">Enter your details to sign in</p>
            </div>

            <form id="signin-form" onsubmit="handleSignIn(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signin-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signin-password" required>
                </div>
                <button type="submit" class="btn-primary w-full">Sign In</button>
            </form>

            <form id="signup-form" onsubmit="handleSignUp(event)" style="display: none;">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signup-email" required>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="signup-username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" required>
                    <p style="font-size: 0.75rem; color: var(--gray-600); margin-top: 4px;">
                        8+ characters, 1 uppercase, 1 lowercase, 1 number.
                    </p>
                </div>
                <button type="submit" class="btn-primary w-full">Create Account</button>
            </form>

            <p class="auth-footer" style="margin-top: 24px;">
                <span id="toggle-text">Don't have an account?</span> 
                <a href="#" onclick="toggleAuthMode(event)" style="color: var(--primary); font-weight: 600;">
                    <span id="toggle-link">Sign up</span>
                </a>
            </p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
